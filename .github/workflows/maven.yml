name: Run Maven with GitHub CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 23
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '23'
          cache: maven

      - name: Delete Maven TestNG Cache (Force Fresh Download)
        run: |
          Remove-Item -Path "$env:USERPROFILE\.m2\repository\org\testng" -Force -Recurse

      - name: Build with Maven
        run: mvn clean test --file pom.xml
